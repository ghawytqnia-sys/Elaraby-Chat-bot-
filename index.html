<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="theme-color" content="#0056D2">
<title>Elaraby AI Enterprise Engine — مساعد المبيعات الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ===== CSS VARIABLES & CORE ===== */
:root {
  --brand-1:#0056D2; --brand-2:#00B4D8; --brand-accent:#06D6A0;
  --bg:#EEF2F7; --surface:#fff; --surface-2:#F4F7FA; --surface-3:#EBF0F8;
  --border:rgba(0,86,210,.12); --text:#0D1B2A; --text-sec:#4A6FA5;
  --user-bg:linear-gradient(135deg,#0056D2,#00B4D8);
  --bot-bg:#fff; --bot-border:rgba(0,86,210,.1);
  --shadow-sm:0 2px 8px rgba(0,86,210,.08); --shadow-md:0 8px 32px rgba(0,86,210,.15); --shadow-lg:0 20px 60px rgba(0,86,210,.2);
  --header:linear-gradient(135deg,#003FA3 0%,#0056D2 50%,#0096C7 100%);
  --input-bg:#F4F7FA; --scrollbar:#C8D8F0;
  --price-bg:#DCFCE7; --price-c:#065F46; --price-b:#A7F3D0;
  --ac-bg:#fff; --ac-border:rgba(0,86,210,.18); --ac-hover:rgba(0,86,210,.06);
  --lb-bg:rgba(0,0,0,.92); --quick-bg:rgba(0,86,210,.07); --quick-border:rgba(0,86,210,.2); --quick-c:var(--brand-1);
}
[data-theme="dark"] {
  --bg:#0A0F1E; --surface:#121929; --surface-2:#1A2540; --surface-3:#1F2D4A;
  --border:rgba(0,180,216,.15); --text:#E8F0FE; --text-sec:#7EB8E6;
  --bot-bg:#1A2540; --bot-border:rgba(0,180,216,.2);
  --shadow-sm:0 2px 8px rgba(0,0,0,.4); --shadow-md:0 8px 32px rgba(0,0,0,.5); --shadow-lg:0 20px 60px rgba(0,0,0,.6);
  --header:linear-gradient(135deg,#050C1A,#0A1628,#0D1F3C);
  --input-bg:#1A2540; --scrollbar:#2A3A5C;
  --price-bg:rgba(6,95,70,.3); --price-c:#6EE7B7; --price-b:rgba(110,231,183,.3);
  --ac-bg:#1A2540; --ac-border:rgba(0,180,216,.2); --ac-hover:rgba(0,180,216,.08);
  --lb-bg:rgba(0,0,0,.96); --quick-bg:rgba(0,180,216,.08); --quick-border:rgba(0,180,216,.25); --quick-c:var(--brand-2);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}

/* ======== LAYOUT =========== */
.fab{position:fixed;bottom:28px;left:28px;width:62px;height:62px;border-radius:50%;background:linear-gradient(135deg,var(--brand-1),var(--brand-2));color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:var(--shadow-md);z-index:1100;transition:transform .35s;animation:fab-pulse 2.5s ease-in-out infinite}
.fab:hover{transform:scale(1.1)}.fab.hidden{transform:scale(0);opacity:0;pointer-events:none}
@keyframes fab-pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,180,216,.5),var(--shadow-md)}50%{box-shadow:0 0 0 16px rgba(0,180,216,0),var(--shadow-md)}}

.chat-wrapper{position:fixed;bottom:108px;left:28px;width:460px;height:720px;max-width:calc(100vw - 40px);max-height:calc(100vh - 130px);background:var(--surface);border-radius:24px;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;overflow:hidden;z-index:1099;opacity:0;transform:translateY(24px) scale(.94);pointer-events:none;transition:opacity .38s,transform .38s;border:1px solid var(--border)}
.chat-wrapper.open{opacity:1;transform:none;pointer-events:all}
@media(max-width:520px){.chat-wrapper{left:0;bottom:0;width:100vw;height:100dvh;max-width:100vw;max-height:100dvh;border-radius:0}.fab{bottom:18px;left:18px}}

/* ======= HEADER & TOOLBAR ======= */
.chat-header{background:var(--header);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:12px}
.header-avatar{width:42px;height:42px;background:rgba(255,255,255,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;border:2px solid rgba(255,255,255,.3)}
.header-info h5{font-family:'Tajawal',sans-serif;font-weight:800;font-size:16px;color:#fff;margin:0;line-height:1.2}
.header-info small{font-size:11px;color:rgba(255,255,255,.75);display:flex;align-items:center;gap:4px}
.header-actions{display:flex;align-items:center;gap:6px}
.header-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:background .2s,transform .2s}
.header-btn:hover{background:rgba(255,255,255,.25);transform:scale(1.05)}.header-btn.close:hover{transform:rotate(90deg) scale(1.05)}

.chat-toolbar{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--surface-2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.chat-toolbar::-webkit-scrollbar{display:none}
.tool-chip{display:flex;align-items:center;gap:5px;padding:6px 14px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:700;color:var(--text-sec);cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.tool-chip:hover{background:var(--brand-1);color:#fff;border-color:var(--brand-1)}

/* ====== CHAT BODY & BUBBLES ======= */
.chat-body{flex:1;overflow-y:auto;padding:18px 14px;background:var(--surface-2);scroll-behavior:smooth}
.chat-body::-webkit-scrollbar{width:4px}.chat-body::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:4px}

.msg-row{display:flex;align-items:flex-end;gap:9px;margin-bottom:16px;animation:msg-in .35s both}
@keyframes msg-in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.msg-row.user{flex-direction:row-reverse}
.msg-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-bottom:2px}
.msg-avatar.bot{background:linear-gradient(135deg,var(--brand-1),var(--brand-2));color:#fff}
.msg-avatar.user{background:linear-gradient(135deg,#CBD5E1,#94A3B8);color:#1e293b}
.bubble{max-width:calc(100%);padding:12px 15px;font-size:14.5px;font-weight:600;line-height:1.75;word-break:break-word}
.bubble.user{background:var(--user-bg);color:#fff;border-radius:18px 4px 18px 18px;box-shadow:0 8px 22px -8px rgba(0,86,210,.45)}
.bubble.bot{background:var(--bot-bg);color:var(--text);border-radius:18px 18px 4px 18px;border:1px solid var(--bot-border);box-shadow:var(--shadow-sm);text-align:right}
.bubble.bot h3,.bubble.bot h4{color:var(--brand-1);font-weight:800;margin:12px 0 8px}
[data-theme="dark"] .bubble.bot h3,[data-theme="dark"] .bubble.bot h4{color:var(--brand-2)}
.bubble.bot strong{color:var(--brand-1)}[data-theme="dark"] .bubble.bot strong{color:var(--brand-2)}
.price-tag{display:inline-flex;align-items:center;gap:5px;background:var(--price-bg);color:var(--price-c);padding:4px 12px;border-radius:8px;font-weight:800;border:1px solid var(--price-b);font-size:14px}

.bubble.bot p { margin-bottom: 10px; }
/* تحسين القوائم النصية العادية لتظهر ككروت مواصفات ذكية */
@keyframes card-entrance { 0% { opacity: 0; transform: translateY(12px); } 100% { opacity: 1; transform: translateY(0); } }
.bubble.bot ul:not(.ai-compare-table ul) { list-style: none; padding: 0; margin: 12px 0; background: var(--surface-3); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; animation: card-entrance 0.4s ease-out forwards; }
.bubble.bot ul:not(.ai-compare-table ul) li { position: relative; padding: 10px 36px 10px 14px; margin: 0; border-bottom: 1px dashed var(--border); line-height: 1.6; font-size: 13.5px; transition: background 0.2s ease; }
.bubble.bot ul:not(.ai-compare-table ul) li:hover { background: rgba(0, 86, 210, 0.04); }
[data-theme="dark"] .bubble.bot ul:not(.ai-compare-table ul) li:hover { background: rgba(0, 180, 216, 0.08); }
.bubble.bot ul:not(.ai-compare-table ul) li:last-child { border-bottom: none; }
.bubble.bot ul:not(.ai-compare-table ul) li::before { content: '\f111'; font-family: 'Font Awesome 6 Free'; font-weight: 900; position: absolute; right: 16px; top: 16px; color: var(--brand-1); font-size: 6px; }
[data-theme="dark"] .bubble.bot ul:not(.ai-compare-table ul) li::before { color: var(--brand-2); }
.bubble.bot ol { padding-right: 22px; padding-left: 0; margin: 8px 0 12px; list-style-type: decimal; }
.bubble.bot ol li { margin-bottom: 8px; padding-right: 4px; line-height: 1.6; }
.bubble.bot code { background: var(--surface-3); color: var(--brand-1); padding: 2px 6px; border-radius: 6px; font-size: 13px; font-family: monospace; }
[data-theme="dark"] .bubble.bot code { color: var(--brand-2); }
.quick-actions i { margin-left: 4px; }
.msg-actions{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
.msg-action-btn{display:flex;align-items:center;gap:4px;padding:3px 9px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;font-size:11px;font-weight:700;color:var(--text-sec);cursor:pointer;transition:all .2s}
.msg-action-btn:hover{background:var(--brand-1);color:#fff}
.msg-action-btn.playing{background:var(--brand-accent);color:#fff;border-color:var(--brand-accent)}

.quick-actions{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
.quick-action-btn{padding:7px 14px;background:var(--quick-bg);border:1.5px solid var(--quick-border);border-radius:999px;font-size:12.5px;font-weight:700;color:var(--quick-c);cursor:pointer;transition:all .22s;white-space:nowrap}
.quick-action-btn:hover{background:var(--brand-1);color:#fff;transform:translateY(-1px)}

/* ====== TABLES & CARDS ========= */
.pro-comp-container { display: flex; gap: 10px; margin-top: 15px; direction: rtl; }
.pro-comp-card { flex: 1; background: var(--surface); border: 2px solid var(--border); border-radius: 14px; padding: 15px 10px; text-align: center; cursor: pointer; transition: 0.3s; }
.pro-comp-card.internal:hover { border-color: #3b82f6; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(59, 130, 246, 0.15); }
.pro-comp-card.external:hover { border-color: #f59e0b; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(245, 158, 11, 0.15); }
.pro-comp-icon { width: 45px; height: 45px; margin: 0 auto 10px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.3s; }
.pro-comp-card.internal .pro-comp-icon { background: #eff6ff; color: #3b82f6; }
.pro-comp-card.external .pro-comp-icon { background: #fffbeb; color: #f59e0b; }
.pro-comp-card h4 { margin: 0 0 6px; font-size: 13.5px; font-weight: 800; }
.pro-comp-card p { margin: 0; color: var(--text-sec); font-size: 11px; font-weight: 600; }

/* تصميم كروت التفاصيل المستقلة للمحرك المحلي */
.product-details-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin: 12px 0; box-shadow: var(--shadow-sm); transition: transform 0.3s, box-shadow 0.3s; animation: card-entrance 0.4s ease-out forwards; }
.product-details-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.product-details-card .card-header { background: linear-gradient(135deg, var(--brand-1), var(--brand-2)); color: #fff; padding: 12px 14px; font-size: 13.5px; font-weight: 800; display: flex; align-items: center; gap: 8px; line-height: 1.4; }
.product-details-card .card-body { padding: 14px; }
.product-details-card .spec-list { list-style: none; padding: 0; margin: 0; }
.product-details-card .spec-list li { position: relative; padding-right: 26px; margin-bottom: 8px; font-size: 13px; line-height: 1.6; color: var(--text); border-bottom: 1px dashed var(--border); padding-bottom: 8px; transition: all 0.2s ease; }
.product-details-card .spec-list li:hover { padding-right: 32px; color: var(--brand-1); }
.product-details-card .spec-list li:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.product-details-card .spec-list li::before { content: '\f111'; font-family: 'Font Awesome 6 Free'; font-weight: 900; position: absolute; right: 8px; top: 10px; color: var(--brand-1); font-size: 6px; }
.product-details-card .card-footer { color: var(--text-sec); display: flex; gap: 10px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); flex-wrap: wrap; }
.card-footer span { border-radius: 8px; font-size: 15px; font-weight: 700; color: #2c2c2c; display: flex; align-items: center; gap: 6px; }

@keyframes wa-pulse {
    0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.6); }
    70% { box-shadow: 0 0 0 10px rgba(37, 211, 102, 0); }
    100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
}

.ai-compare-table-wrapper { width: 100%; overflow-x: auto; margin: 15px 0; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); }
.ai-compare-table { width: 100%; min-width: 420px; border-collapse: collapse; font-size: 12.5px; direction: rtl; }
.ai-compare-table th, .ai-compare-table td { padding: 10px 8px; border-bottom: 1px solid var(--border); border-left: 1px solid var(--border); text-align: center; vertical-align: middle; }
.ai-compare-table th { background: linear-gradient(135deg, var(--brand-1), var(--brand-2)); color: white; font-weight: 650; }
.ai-compare-table td:first-child, .ai-compare-table th:first-child { width: 28%; background: var(--surface-2); font-weight: 700; color: var(--brand-1); text-align: right; border-left: 2px solid var(--border); }
.ai-compare-table tr:nth-child(even) td { background-color: rgba(0, 86, 210, 0.01); }
[data-theme="dark"] .ai-compare-table td:first-child { background-color: #1A2540; color: var(--brand-2); }
@media (max-width: 520px) {
  .msg-row.has-table { display: block; margin-left: -14px; margin-right: -14px; width: calc(100% + 28px); }
  .msg-row.has-table .msg-avatar { display: none; }
  .msg-row.has-table .bubble.bot { max-width: 100% !important; width: 100% !important; border-radius: 0; border: none; padding: 10px 0; }
  .msg-row.has-table .ai-compare-table-wrapper { border-radius: 0; border-left: none; border-right: none; margin: 0; }
}

/* ===== LOADER & UI ELEMENTS ======= */
.typing-indicator{display:flex;align-items:center;gap:5px;padding:4px 2px}
.dot{width:6px;height:6px;background:var(--brand-2);border-radius:50%;animation:bounce 1.4s infinite both}
.dot:nth-child(1){animation-delay:-.32s}.dot:nth-child(2){animation-delay:-.16s}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.5}40%{transform:scale(1);opacity:1}}
.skeleton{background:linear-gradient(90deg,var(--border) 25%,rgba(0,86,210,.06) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;height:12px;margin-bottom:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.ac-wrapper{position:relative;width:100%}
.ac-dropdown{position:absolute;bottom:calc(100% + 6px);left:0;right:0;background:var(--ac-bg);border:1.5px solid var(--ac-border);border-radius:14px;box-shadow:var(--shadow-md);max-height:240px;overflow-y:auto;z-index:200;display:none}
.ac-dropdown.open{display:block}
.ac-item{display:flex;align-items:center;gap:10px;padding:9px 13px;cursor:pointer;border-bottom:1px solid var(--border)}
.ac-item:hover, .ac-item.active{background:var(--ac-hover)}
.ac-item-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--brand-1),var(--brand-2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;flex-shrink:0}
.ac-item-name{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-item-price{font-weight:700;color:var(--price-c);font-size:11px}
.ac-empty{padding:12px;color:var(--text-sec);font-size:13px;font-weight:700;text-align:center}

.chat-footer{padding:14px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.input-row{display:flex;align-items:center;gap:8px;background:var(--input-bg);border:1.5px solid var(--border);border-radius:26px;padding:6px 6px 6px 16px;transition:border-color .22s}
.input-row:focus-within{border-color:var(--brand-1);box-shadow:0 0 0 4px rgba(0,86,210,.12)}
.message-input{flex:1;background:transparent;border:none;outline:none;font-family:'Cairo',sans-serif;font-size:14.5px;font-weight:600;color:var(--text);min-height:36px;resize:none;max-height:100px}
.footer-btn{width:40px;height:40px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .25s;flex-shrink:0}
.footer-btn.send{background:linear-gradient(135deg,var(--brand-1),var(--brand-2));color:#fff;box-shadow:0 6px 18px -4px rgba(0,86,210,.5)}
.footer-btn.send:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
.footer-btn.mic{background:var(--surface);color:var(--text-sec);border:1.5px solid var(--border)}
.footer-btn.mic.listening{background:#FF4757;color:#fff;border-color:#FF4757;animation:mic-pulse .8s ease-in-out infinite}
@keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,71,87,.5)}50%{box-shadow:0 0 0 8px rgba(255,71,87,0)}}

/* ====== SWIPE GALLERY & ADVANCED LIGHTBOX ======= */
.product-gallery { border-radius:14px; overflow:hidden; background:var(--surface-3); border:1px solid var(--border); margin:10px 0; touch-action:pan-y; }
.gallery-main { position:relative; width:100%; padding-bottom:66%; background:#f0f0f0; overflow:hidden; cursor:grab; }
.gallery-main:active { cursor:grabbing; }
[data-theme="dark"] .gallery-main { background:#1a2030; }
.gallery-main-img { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; transition:transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease; user-select:none; -webkit-user-drag:none; }
.gallery-main-img.loading { opacity:0; }
.gallery-counter { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.55); color:#fff; font-size:11px; font-weight:700; padding:2px 10px; border-radius:10px; pointer-events:none; z-index:5; font-family:'Cairo',sans-serif; }
.gallery-swipe-hint { position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.5); color:#fff; padding:4px 8px; border-radius:12px; font-size:10px; z-index:10; pointer-events:none; opacity:0; transition:opacity 0.3s; }
.gallery-main:hover .gallery-swipe-hint { opacity:1; }
.gallery-thumbs { display:flex; gap:7px; padding:10px 12px; overflow-x:auto; scrollbar-width:none; background:var(--surface-3); border-top:1px solid var(--border); }
.gallery-thumbs::-webkit-scrollbar { display:none; }
.gallery-thumb { width:52px; height:52px; border-radius:8px; object-fit:cover; cursor:pointer; border:2px solid transparent; transition:all .2s; flex-shrink:0; opacity:.7; }
.gallery-thumb.active { border-color:var(--brand-1); opacity:1; }
.gallery-thumb:hover { opacity:1; }

.color-swatches { display:flex; gap:8px; padding:8px 12px; flex-wrap:wrap; border-top:1px solid var(--border); }
.color-swatch { width:28px; height:28px; border-radius:50%; cursor:pointer; border:3px solid transparent; transition:all .2s; box-shadow:0 2px 6px rgba(0,0,0,0.15); }
.color-swatch.active { border-color:var(--brand-1); transform:scale(1.15); }

/* ====== LIGHTBOX STYLING ======== */
.lightbox { position:fixed; inset:0; background:var(--lb-bg); z-index:9000; display:none; align-items:center; justify-content:center; opacity:0; transition:opacity .28s; }
.lightbox.open { display:flex; opacity:1; }
.lightbox-inner { position:relative; max-width:100vw; max-height:100vh; display:flex; align-items:center; justify-content:center; touch-action:none; width:100%; height:100%; overflow:hidden; }
.lightbox-img { max-width:95vw; max-height:88vh; object-fit:contain; border-radius:10px; transform-origin:center; transition:transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.2s; user-select:none; -webkit-user-drag:none; }
.lb-close { position:fixed; top:16px; right:16px; background:rgba(255,255,255,0.15); border:none; color:#fff; width:40px; height:40px; border-radius:50%; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; transition:background .2s; z-index:9001; }
.lb-close:hover { background:rgba(255,255,255,0.3); }
.lb-nav { position:fixed; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.12); border:none; color:#fff; width:44px; height:44px; border-radius:50%; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; transition:background .2s; z-index:9001; }
.lb-nav:hover { background:rgba(255,255,255,0.25); }
.lb-prev { right:16px; }
.lb-next { left:16px; }

<!-- ADVANCED LIGHTBOX CONTAINER -->

  </div>

<div class="copy-toast" id="copyToast">تم النسخ ✓</div>

<script>
// ================= STATE =================
const STATE = {
  sessionId: localStorage.getItem("zeko_sid") || (()=>{ let id = crypto.randomUUID(); localStorage.setItem("zeko_sid", id); return id; })(),
  theme: localStorage.getItem("zeko_theme") || "light",
  isStreaming: false,
  pendingAction: null,
  lbImages: [],
  lbIndex: 0,
  lbScale: 1,
  acIndex: -1,
  acItems: []
};

const API_PREFIX = window.location.origin.includes("hf.space") || window.location.port === "8000"
  ? "" 
  : "https://abokyan-elaraby-ai.hf.space";

// ================= UI & DOM =================
const UI = {
  addMessage(text, isUser, loading=false, id=null, isRawHTML=false) {
    const row = document.createElement("div");
    row.className = `msg-row ${isUser ? "user" : "bot"}`;
    if (id) row.id = id;

    const avatar = `<div class="msg-avatar ${isUser?"user":"bot"}"><i class="fas ${isUser?"fa-user":(loading?"fa-circle-notch fa-spin":"fa-robot")}"></i></div>`;
    const content = loading ? `<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>` : (isUser ? `<span dir="auto">${this.escape(text)}</span>` : `<div dir="auto">${isRawHTML ? text : this.parseMarkdown(text)}</div>`);
    
    const actions = (!isUser && !loading && !isRawHTML) ? `<div class="msg-actions"><button class="msg-action-btn" onclick="UI.copyBubble(this)"><i class="fas fa-copy"></i> نسخ</button></div>` : "";
    
    row.innerHTML = isUser ? `<div><div class="bubble user">${content}</div></div>${avatar}` : `${avatar}<div style="width:100%"><div class="bubble bot">${content}</div>${actions}</div>`;
    document.getElementById("chatWindow").appendChild(row);
    this.scrollToBottom();
    return row;
  },

  escape(str) { 
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;"); 
  },

  scrollToBottom() { const el = document.getElementById("chatWindow"); el.scrollTop = el.scrollHeight; },
  
  parseMarkdown(text) {
    return marked.parse(text)
      .replace(/<table>/g, '<div class="ai-compare-table-wrapper"><table class="ai-compare-table" dir="rtl">')
      .replace(/<\/table>/g, '</table></div>');
  },

  showQuickActions(name) {
    const row = document.createElement("div");
    row.className = "msg-row bot";
    row.innerHTML = `<div class="msg-avatar bot"><i class="fas fa-robot"></i></div>
      <div style="width:100%"><div class="bubble bot" dir="auto">
        <strong>ممتاز! اخترت: ${this.escape(name)}</strong><br>
        <span style="color:var(--text-sec);font-size:13px">ماذا تريد أن تعرف عن هذا المنتج؟</span>
        <div class="quick-actions" style="margin-top:10px">
          <button class="quick-action-btn" onclick="quickAsk('السعر','${this.escape(name)}')"><i class="fas fa-tag"></i> السعر</button>
          <button class="quick-action-btn" onclick="quickAsk('المواصفات','${this.escape(name)}')"><i class="fas fa-list-check"></i> المواصفات</button>
          <button class="quick-action-btn" onclick="quickAsk('صور','${this.escape(name)}')"><i class="fas fa-images"></i> الصور</button>
          <button class="quick-action-btn" onclick="quickAsk('أقنعني بشراء','${this.escape(name)}')"><i class="fas fa-magic" style="color:#f59e0b"></i> خطة البيع</button>
          <button class="quick-action-btn" onclick="UI.askCompare('${this.escape(name)}')"><i class="fas fa-scale-balanced" style="color:#3b82f6"></i> مقارنة</button>
        </div>
      </div></div>`;
    document.getElementById("chatWindow").appendChild(row);
    this.scrollToBottom();
  },

  askCompare(name) {
    const row = document.createElement("div");
    row.className = "msg-row bot";
    row.innerHTML = `<div class="msg-avatar bot"><i class="fas fa-robot"></i></div>
      <div style="width:100%"><div class="bubble bot" dir="auto">
        <strong>مقارنة المنتج:</strong> ${name}<br>
        <div class="pro-comp-container">
            <div class="pro-comp-card internal" onclick="UI.startCompare('LOCAL_COMPARE', '${name.replace(/'/g, "\\'")}')">
                <div class="pro-comp-icon"><i class="fas fa-store"></i></div><h4>منتج من العربى</h4>
            </div>
            <div class="pro-comp-card external" onclick="UI.startCompare('AI_COMPARE', '${name.replace(/'/g, "\\'")}')">
                <div class="pro-comp-icon"><i class="fas fa-globe"></i></div><h4>منافس خارجي</h4>
            </div>
        </div>
      </div></div>`;
    document.getElementById("chatWindow").appendChild(row);
    this.scrollToBottom();
  },

  startCompare(type, name) {
    STATE.pendingAction = { type: type, productA: name };
    const inp = document.getElementById("messageInput");
    inp.value = "";
    if (type === 'LOCAL_COMPARE') {
        inp.placeholder = "اكتب اسم الموديل الآخر من العربي هنا...";
        this.addMessage("ممتاز، لقد اخترت <b>المقارنة المحلية</b>.<br>من فضلك اكتب اسم أو كود المنتج الثاني التابع لنا:", false, false, null, true);
    } else {
        inp.placeholder = "اكتب الماركة وكود المنتج المنافس...";
        this.addMessage("ممتاز، لقد اخترت <b>المقارنة الخارجية</b>.<br>اكتب <u>الماركة والكود</u> الخاص بالمنتج المنافس لكي أقارنه لك بالذكاء الاصطناعي:", false, false, null, true);
    }
    inp.focus();
  },

  buildGallery(product) {
    const images = product.images || [];
    const colors = product.colors || [];
    if (!images.length && !colors.length) return `<div class="bubble bot">عذراً، لا توجد صور متوفرة لهذا المنتج.</div>`;

    const allImages = images.length ? images : (colors.flatMap(c => c.images || [c.image]).filter(Boolean));
    if (!allImages.length) return `<div class="bubble bot">عذراً، لا توجد صور متوفرة لهذا المنتج.</div>`;

    const thumbsHTML = allImages.map((src, i) =>
      `<img class="gallery-thumb${i===0?" active":""}" src="${UI.escape(src)}" alt="صورة ${i+1}" loading="lazy" data-idx="${i}" onerror="this.style.display='none'">`
    ).join("");

    const colorSwatches = colors.length ? `<div class="color-swatches">${colors.map((c,i)=>`<div class="color-swatch${i===0?" active":""}" style="background:${UI.escape(c.hex||c.color||'#ccc')}" title="${UI.escape(c.name||'')}" data-cidx="${i}" data-images='${UI.escape(JSON.stringify(c.images||[c.image]||[]))}'></div>`).join("")}</div>` : "";

    return `<div class="bubble bot" style="padding:8px" dir="auto">
      <strong>📷 صور المنتج: ${UI.escape(product.name)}</strong>
      <div class="product-gallery" data-images='${UI.escape(JSON.stringify(allImages))}'>
        <div class="gallery-main">
          <div class="gallery-swipe-hint"><i class="fas fa-arrows-left-right"></i> اسحب للتقليب</div>
          <img src="${UI.escape(allImages[0])}" alt="صورة المنتج" class="gallery-main-img" data-idx="0">
          ${allImages.length > 1 ? `<div class="gallery-counter">1 / ${allImages.length}</div>` : ""}
        </div>
        ${allImages.length > 1 ? `<div class="gallery-thumbs">${thumbsHTML}</div>` : ""}
        ${colorSwatches}
      </div>
      <small style="color:var(--brand-1); cursor:pointer;" onclick="const img=this.previousElementSibling.querySelector('.gallery-main-img'); Gallery.openLightbox(img, JSON.parse(this.previousElementSibling.dataset.images))">اضغط لتكبير الصورة</small>
    </div>`;
  },

  copyBubble(btn) {
    const txt = btn.closest(".msg-row").querySelector(".bubble").innerText;
    navigator.clipboard.writeText(txt);
    document.getElementById("copyToast").classList.add("show");
    setTimeout(()=>document.getElementById("copyToast").classList.remove("show"), 2000);
  }
};

// ======== MODULE: IMAGE GALLERY (SWIPE & INTERACTION) =================
const Gallery = {
  wireGallery(galleryEl) {
    const images = JSON.parse(galleryEl.dataset.images || "[]");
    const mainImg = galleryEl.querySelector(".gallery-main-img");
    const counter = galleryEl.querySelector(".gallery-counter");
    const thumbs  = galleryEl.querySelectorAll(".gallery-thumb");
    const mainImgDiv = galleryEl.querySelector('.gallery-main');

    const updateView = (idx) => {
      if(!mainImg || !images[idx]) return;
      mainImg.style.opacity = "0";
      setTimeout(() => { 
        mainImg.src = images[idx]; 
        mainImg.dataset.idx = idx; 
        mainImg.style.opacity = "1"; 
      }, 150);
      if(counter) counter.textContent = `${idx+1} / ${images.length}`;
      thumbs.forEach((t,i) => t.classList.toggle("active", i === idx));
      if(thumbs[idx]) thumbs[idx].scrollIntoView({ behavior:"smooth", block:"nearest", inline:"center" });
    };

    galleryEl.querySelectorAll(".color-swatch").forEach(swatch => {
      swatch.addEventListener("click", () => {
        const imgs = JSON.parse(swatch.dataset.images || "[]");
        if (!imgs.length) return;
        galleryEl.dataset.images = JSON.stringify(imgs);
        galleryEl.querySelectorAll(".color-swatch").forEach(s => s.classList.remove("active"));
        swatch.classList.add("active");
        
        const thumbsContainer = galleryEl.querySelector(".gallery-thumbs");
        if (thumbsContainer) {
          thumbsContainer.innerHTML = imgs.map((src,i) =>
            `<img class="gallery-thumb${i===0?" active":""}" src="${UI.escape(src)}" loading="lazy" data-idx="${i}">`
          ).join("");
        }
        this.wireGallery(galleryEl); 
        updateView(0);
      });
    });

    if(images.length <= 1) {
        if(mainImg) mainImg.onclick = () => this.openLightbox(mainImg, images);
        return;
    }

    thumbs.forEach(thumb => thumb.addEventListener("click", () => updateView(parseInt(thumb.dataset.idx))));
    
    // Swipe Handler
    let startX = 0, currentX = 0, isDragging = false;
    
    if (mainImgDiv) {
        mainImgDiv.addEventListener('touchstart', e => {
          if (e.touches.length === 1) {
            startX = e.touches[0].clientX;
            isDragging = true;
            mainImg.style.transition = "none"; 
          }
        }, {passive: true});

        mainImgDiv.addEventListener('touchmove', e => {
          if (!isDragging) return;
          currentX = e.touches[0].clientX;
          const diff = currentX - startX;
          mainImg.style.transform = `translateX(${diff * 0.8}px)`; 
        }, {passive: false});

        mainImgDiv.addEventListener('touchend', e => {
          if (!isDragging) return;
          isDragging = false;
          mainImg.style.transition = "transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s";
          mainImg.style.transform = "translateX(0)";
          
          let diff = e.changedTouches[0].clientX - startX;
          let currIdx = parseInt(mainImg.dataset.idx || "0");
          if (diff > 60) { 
             updateView((currIdx - 1 + images.length) % images.length);
          } else if (diff < -60) { 
             updateView((currIdx + 1) % images.length);
          } else { 
             if(Math.abs(diff) < 10) this.openLightbox(mainImg, JSON.parse(galleryEl.dataset.images || "[]"));
          }
        });
        
        mainImgDiv.onmousedown = (e) => {
            startX = e.clientX; isDragging = true; mainImg.style.transition = "none";
        };
        mainImgDiv.onmousemove = (e) => {
            if(!isDragging) return;
            const diff = e.clientX - startX;
            mainImg.style.transform = `translateX(${diff * 0.8}px)`;
        };
        mainImgDiv.onmouseup = mainImgDiv.onmouseleave = (e) => {
            if(!isDragging) return;
            isDragging = false;
            mainImg.style.transition = "transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s";
            mainImg.style.transform = "translateX(0)";
            let diff = e.clientX - startX;
            let currIdx = parseInt(mainImg.dataset.idx || "0");
            if (diff > 60) updateView((currIdx - 1 + images.length) % images.length);
            else if (diff < -60) updateView((currIdx + 1) % images.length);
            else if(Math.abs(diff) < 10) this.openLightbox(mainImg, JSON.parse(galleryEl.dataset.images || "[]"));
        };
    }
  },

  openLightbox(imgEl, images) {
    const idx = parseInt(imgEl.dataset.idx || "0");
    STATE.lbImages = images;
    STATE.lbIndex  = idx;
    STATE.lbScale  = 1;
    const lb = document.getElementById("lightbox");
    const lbImg = document.getElementById("lbImg");
    lbImg.src = images[idx] || imgEl.src;
    lbImg.style.transform = "scale(1)";
    lb.classList.add("open");
    document.getElementById("lbPrev").style.display = images.length > 1 ? "" : "none";
    document.getElementById("lbNext").style.display = images.length > 1 ? "" : "none";
  },

  closeLightbox() {
    document.getElementById("lightbox").classList.remove("open");
    STATE.lbImages = []; STATE.lbIndex = 0; STATE.lbScale = 1;
  },

  initLightboxEvents() {
    const lb    = document.getElementById("lightbox");
    const lbImg = document.getElementById("lbImg");
    const lbInner = document.getElementById("lbInner");

    document.getElementById("lbClose").addEventListener("click", () => this.closeLightbox());
    
    const nav = (dir) => {
      if (!STATE.lbImages.length) return;
      STATE.lbIndex = (STATE.lbIndex + dir + STATE.lbImages.length) % STATE.lbImages.length;
      STATE.lbScale = 1;
      lbImg.style.opacity = "0";
      setTimeout(() => { 
          lbImg.src = STATE.lbImages[STATE.lbIndex]; 
          lbImg.style.transform = "scale(1)"; 
          lbImg.style.opacity = "1"; 
      }, 200);
    };

    document.getElementById("lbPrev").addEventListener("click", () => nav(-1));
    document.getElementById("lbNext").addEventListener("click", () => nav(1));
    lb.addEventListener("click", e => { if (e.target === lb) this.closeLightbox(); });
    
    document.addEventListener("keydown", e => {
      if (!lb.classList.contains("open")) return;
      if (e.key === "Escape")     this.closeLightbox();
      if (e.key === "ArrowRight") nav(-1);
      if (e.key === "ArrowLeft")  nav(1);
    });

    let lastTap = 0;
    lbImg.addEventListener("dblclick", () => {
      STATE.lbScale = STATE.lbScale > 1 ? 1 : 2.5;
      lbImg.style.transform = `scale(${STATE.lbScale})`;
    });
    
    // Zoom Gestures
    let initDist = 0, initScale = 1, startX = 0, isDragging = false;
    
    lbInner.addEventListener("touchstart", e => {
      if (e.touches.length === 2) {
        initDist  = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
        initScale = STATE.lbScale;
      } else if (e.touches.length === 1 && STATE.lbScale === 1) {
        startX = e.touches[0].clientX;
        isDragging = true;
        lbImg.style.transition = "none";
      }
    }, { passive: true });
    
    lbInner.addEventListener("touchmove", e => {
      if (e.touches.length === 2) {
        const dist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
        STATE.lbScale = Math.min(Math.max(initScale * (dist / initDist), 0.5), 5);
        lbImg.style.transform = `scale(${STATE.lbScale})`;
      } else if (isDragging && STATE.lbScale === 1) {
        const diff = e.touches[0].clientX - startX;
        lbImg.style.transform = `translateX(${diff}px)`;
      }
    }, { passive: true });
    
    lbInner.addEventListener("touchend", e => {
      const now = Date.now();
      if (now - lastTap < 300 && e.changedTouches.length === 1) {
        STATE.lbScale = STATE.lbScale > 1 ? 1 : 2.5;
        lbImg.style.transform = `scale(${STATE.lbScale})`;
      }
      lastTap = now;
      
      if (isDragging) {
        isDragging = false;
        lbImg.style.transition = "transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.2s";
        lbImg.style.transform = "translateX(0)";
        let diff = e.changedTouches[0].clientX - startX;
        if (diff > 70) nav(-1); 
        else if (diff < -70) nav(1); 
      }
    });

    lbInner.addEventListener("wheel", e => {
      e.preventDefault();
      const zoomFactor = e.deltaY < 0 ? 1.1 : 0.9;
      STATE.lbScale = Math.min(Math.max(STATE.lbScale * zoomFactor, 1), 5);
      lbImg.style.transform = `scale(${STATE.lbScale})`;
    }, { passive: false });
  }
};

// ================= STT MODULE (SPEECH-TO-TEXT) =================
const STTModule = {
  recognition: null,
  isListening: false,
  currentLang: 'ar-EG',
  
  init() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    this.recognition = new SR();
    this.recognition.continuous = true;
    this.recognition.interimResults = true;
    this.recognition.lang = this.currentLang;

    this.recognition.onstart = () => {
      this.isListening = true;
      document.getElementById("micButton").classList.add("listening");
      document.getElementById("listeningBanner").classList.add("show");
    };

    this.recognition.onend = () => {
      this.isListening = false;
      document.getElementById("micButton").classList.remove("listening");
      document.getElementById("listeningBanner").classList.remove("show");
    };

    this.recognition.onresult = (event) => {
      let interimTranscript = '';
      let finalTranscript = '';

      for (let i = event.resultIndex; i < event.results.length; ++i) {
        if (event.results[i].isFinal) {
          finalTranscript += event.results[i][0].transcript;
        } else {
          interimTranscript += event.results[i][0].transcript;
        }
      }

      document.getElementById("interimText").textContent = interimTranscript || (this.currentLang === 'ar-EG' ? "جاري الاستماع..." : "Listening...");
      if (finalTranscript) {
        const input = document.getElementById("messageInput");
        input.value = (input.value ? input.value.trim() + " " : "") + finalTranscript.trim();
        input.style.height = "auto";
        input.style.height = Math.min(input.scrollHeight, 100) + "px";
      }
    };

    document.getElementById("micButton").addEventListener("click", () => this.toggle());
  },

  toggle() {
    if (!this.recognition) return;
    if (this.isListening) {
      this.recognition.stop();
    } else {
      this.recognition.start();
    }
  }
};

// ================= BACKEND COMMUNICATION WITH SSE =================
async function sendMessage() {
  const inp = document.getElementById("messageInput");
  const text = inp.value.trim();
  if(!text || STATE.isStreaming) return;
  
  inp.value = ""; 
  inp.style.height = "auto";
  document.getElementById("acDropdown").classList.remove("open");
  UI.addMessage(text, true);
  
  STATE.isStreaming = true;
  document.getElementById("sendButton").innerHTML = '<i class="fas fa-stop"></i>';
  
  const botRowId = "bot-" + Date.now();
  const botRow = UI.addMessage("", false, true, botRowId);
  const botBubble = botRow.querySelector(".bubble.bot");

  const currentPendingAction = STATE.pendingAction;
  STATE.pendingAction = null;
  inp.placeholder = "اكتب اسم المنتج أو الموديل...";

  try {
    const res = await fetch(`${API_PREFIX}/api/chat`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        text: text, 
        session_id: STATE.sessionId, 
        pending_action: currentPendingAction
      })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder("utf-8");
    let fullText = "";
    let buffer = ""; 
    botBubble.innerHTML = ""; 
    
    while(true) {
      const {done, value} = await reader.read();
      if(done) break;
      
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop(); 
      
      for(let line of lines) {
        line = line.trim();
        if(!line.startsWith("data: ")) continue;
        const dataStr = line.substring(6).trim();
        if(!dataStr || dataStr === "[DONE]") continue;
        
        try {
          const data = JSON.parse(dataStr);
          
          if(data.type === 'token') {
            fullText += data.text;
            botBubble.innerHTML = `<div dir="auto">${UI.parseMarkdown(fullText)}</div>`;
            UI.scrollToBottom();
            
          } else if (data.type === 'local') {
            console.log("[DEBUG LOG] UI Component rendered cleanly.");
            if (data.is_table) botRow.classList.add("has-table");
            
            if (data.is_standalone) {
              botBubble.innerHTML = data.html;
            } else {
              botBubble.innerHTML = data.html + `<div class="analysis-text-holder"></div>`;
            }
            UI.scrollToBottom();
            
          } else if (data.type === 'gallery') {
            botRow.querySelector('div[style="width:100%"]').innerHTML = UI.buildGallery(data.product);
            const gal = botRow.querySelector('.product-gallery');
            if(gal) Gallery.wireGallery(gal);
            UI.scrollToBottom();
            
          } else if (data.type === 'error') {
            botBubble.innerHTML = `<div class="error-notice"><i class="fas fa-exclamation-triangle"></i> ${data.message}</div>`;
            UI.scrollToBottom();
            
          } else if (data.type === 'done') {
            break;
          }
        } catch(e) {
          console.warn("JSON parse skipped for chunk:", e);
        }
      }
    }
    
    if(fullText && !botRow.querySelector('.msg-actions') && !botRow.classList.contains("has-table")) {
      botRow.querySelector('div[style="width:100%"]').insertAdjacentHTML('beforeend', `<div class="msg-actions"><button class="msg-action-btn" onclick="UI.copyBubble(this)"><i class="fas fa-copy"></i> نسخ</button></div>`);
    }
    
  } catch(e) {
    console.error("Connection Error:", e);
    botBubble.innerHTML = `<div class="error-notice"><i class="fas fa-exclamation-triangle"></i> عذراً، حدث خطأ في الاتصال بالخادم. تأكد من جودة الإنترنت.</div>`;
  }
  
  STATE.isStreaming = false;
  document.getElementById("sendButton").innerHTML = '<i class="fas fa-paper-plane"></i>';
}

// ================= AUTOCOMPLETE =================
let debounceTimer;

function selectAutocompleteItem(name) {
  const dd = document.getElementById("acDropdown");
  dd.classList.remove("open");
  
  const input = document.getElementById("messageInput");
  input.value = name;
  input.style.height = "auto";

  if (STATE.pendingAction) {
    sendMessage();
  } else {
    UI.showQuickActions(name);
  }
}

function setAcActive(idx) {
  STATE.acIndex = idx;
  const items = document.querySelectorAll(".ac-item");
  items.forEach((item, i) => {
    item.classList.toggle("active", i === idx);
  });
}

function updateAcActiveRow() {
  const items = document.querySelectorAll(".ac-item");
  items.forEach((item, i) => {
    const isActive = i === STATE.acIndex;
    item.classList.toggle("active", isActive);
    if (isActive) {
      item.scrollIntoView({ block: "nearest" });
    }
  });
}

document.getElementById("messageInput").addEventListener("input", e => {
  e.target.style.height = "auto"; e.target.style.height = Math.min(e.target.scrollHeight, 100) + "px";
  clearTimeout(debounceTimer);
  const q = e.target.value.trim();
  if(q.length < 2) { document.getElementById("acDropdown").classList.remove("open"); return; }
  
  debounceTimer = setTimeout(async () => {
    try {
        const res = await fetch(`${API_PREFIX}/api/autocomplete?q=${encodeURIComponent(q)}`);
        if (!res.ok) return;
      
        const results = await res.json();
        const dd = document.getElementById("acDropdown");
        if(!results || results.length === 0) { 
            dd.innerHTML="<div class='ac-empty'>لا توجد نتائج مطابقة</div>"; 
            STATE.acItems = [];
            STATE.acIndex = -1;
        } 
        else {
            STATE.acItems = results;
            STATE.acIndex = -1;
            dd.innerHTML = results.map((p, idx) => `
                <div class="ac-item" id="ac-item-${idx}" onclick="selectAutocompleteItem('${p.name.replace(/'/g, "\\'")}')" onmouseover="setAcActive(${idx})">
                    <div class="ac-item-icon"><i class="fas fa-box"></i></div>
                    <div class="ac-item-body">
                        <div class="ac-item-name">${p.name}</div>
                        <div class="ac-item-price">${p.price}</div>
                    </div>
                </div>`).join("");
        }
        dd.classList.add("open");
    } catch (err) {}
  }, 200);
});

document.addEventListener("click", e => {
  const dd = document.getElementById("acDropdown");
  const inp = document.getElementById("messageInput");
  if (dd && e.target !== dd && e.target !== inp && !dd.contains(e.target)) {
    dd.classList.remove("open");
  }
});

// ================= HELPERS & EVENTS =================
function insertChip(val) {
  const i = document.getElementById("messageInput");
  i.value = val; i.focus();
  document.getElementById("acDropdown").classList.remove("open");
}

document.getElementById("sendButton").onclick = sendMessage;

document.getElementById("messageInput").onkeydown = e => { 
  const dd = document.getElementById("acDropdown");
  const isOpen = dd.classList.contains("open");
  
  if (isOpen && STATE.acItems.length > 0) {
    if (e.key === "ArrowDown") {
      e.preventDefault();
      STATE.acIndex = (STATE.acIndex + 1) % STATE.acItems.length;
      updateAcActiveRow();
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      STATE.acIndex = (STATE.acIndex - 1 + STATE.acItems.length) % STATE.acItems.length;
      updateAcActiveRow();
    } else if (e.key === "Enter") {
      if (STATE.acIndex >= 0 && STATE.acIndex < STATE.acItems.length) {
        e.preventDefault();
        selectAutocompleteItem(STATE.acItems[STATE.acIndex].name);
        return;
      }
    } else if (e.key === "Escape") {
      e.preventDefault();
      dd.classList.remove("open");
      return;
    }
  }

  if(e.key==="Enter" && !e.shiftKey){ 
    e.preventDefault(); 
    sendMessage(); 
  } 
};

document.getElementById("fabBtn").onclick = () => { document.getElementById("chatWrapper").classList.add("open"); document.getElementById("fabBtn").classList.add("hidden"); };
document.getElementById("closeChatBtn").onclick = () => { document.getElementById("chatWrapper").classList.remove("open"); document.getElementById("fabBtn").classList.remove("hidden"); };
document.getElementById("toggleThemeBtn").onclick = () => {
  STATE.theme = STATE.theme === "dark" ? "light" : "dark";

  document.getElementById("themeIcon").className = STATE.theme === "dark" ? "fas fa-sun" : "fas fa-moon";
  localStorage.setItem("zeko_theme", STATE.theme);
};

async function shareProduct(btn, textEncoded, imageUrl) {
  const originalHtml = btn.innerHTML;
  const text = decodeURIComponent(textEncoded);
  try {
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التجهيز...';
    btn.disabled = true;

    try { await navigator.clipboard.writeText(text); } catch(e){}

    let filesArray = [];
    if (imageUrl && imageUrl.trim() !== "") {
      try {
        const proxyUrl = `${API_PREFIX}/api/proxy-image?url=${encodeURIComponent(imageUrl)}`;
        const response = await fetch(proxyUrl);
        if (!response.ok) throw new Error("Proxy fetch failed");
        const blob = await response.blob();
        const mimeType = blob.type || 'image/jpeg';
        const extension = mimeType.split('/')[1] || 'jpg';
        
        const file = new File([blob], `elaraby-product.${extension}`, { type: mimeType });
        filesArray = [file];
      } catch (e) {
        console.warn("Could not fetch image via proxy, sending text only.", e);
      }
    }

    if (navigator.canShare && navigator.canShare({ files: filesArray, text: text })) {
      await navigator.share({
        title: 'عرض من العربي جروب',
        text: text,
        files: filesArray
      });
    } else {
      try { await navigator.clipboard.writeText(text); } catch(err){}
      const waUrl = `https://wa.me/?text=${encodeURIComponent(text)}`;
      window.open(waUrl, '_blank');
      if (filesArray.length > 0) {
        alert("تم نسخ تفاصيل المنتج، يمكنك لصقها الآن في واتساب. (المشاركة المباشرة للصور مدعومة على الهواتف فقط)");
      }
    }
  } catch (error) {
    console.error("Sharing failed:", error);
  } finally {
    btn.innerHTML = originalHtml;
    btn.disabled = false;
  }
}
